# ============================================
# RAG 知识库系统 - Docker Compose
# 包含 PostgreSQL、ChromaDB、Neo4j
# ============================================

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_kb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_kb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- ChromaDB ---
  chromadb:
    image: chromadb/chroma:latest
    container_name: rag_chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

  # --- Neo4j (Memary 知识图谱) ---
  neo4j:
    image: neo4j:5-community
    container_name: rag_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  chroma_data:
  neo4j_data:
